<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#020008">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ZYPHRA">
<meta name="description" content="Encrypted Zyphari messaging app">
<title>ZYPHRA</title>

<link id="manifestLink" rel="manifest">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --void: #020008; --deep: #08001a; --mid: #12002e; --cyan: #00f5ff;
  --violet: #b400ff; --pink: #ff00aa; --green: #00ff88;
  --soft-cyan: rgba(0,245,255,0.12); --soft-violet: rgba(180,0,255,0.12);
  --glow-c: 0 0 8px #00f5ff, 0 0 25px rgba(0,245,255,0.35);
  --glow-v: 0 0 8px #b400ff, 0 0 25px rgba(180,0,255,0.35);
  --glow-p: 0 0 8px #ff00aa, 0 0 25px rgba(255,0,170,0.35);
  --glass: rgba(255,255,255,0.03); --gb: rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;}
input,textarea,select{-webkit-user-select:text!important;user-select:text!important;}
html,body{height:100%;overflow:hidden;background:#000;}
body { font-family:'Share Tech Mono',monospace; color:#fff; display:flex; justify-content:center; align-items:center; background:radial-gradient(ellipse 100% 100% at 50% 50%, #0a0018 0%, #020008 100%); }
.bg {position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-grad { position:absolute;inset:0; background: radial-gradient(ellipse 70% 50% at 15% 85%, rgba(180,0,255,0.1) 0%, transparent 55%), radial-gradient(ellipse 50% 70% at 85% 15%, rgba(0,245,255,0.07) 0%, transparent 55%), radial-gradient(ellipse 30% 30% at 50% 50%, rgba(180,0,255,0.04) 0%, transparent 60%); }
.grid { position:absolute;inset:0; background-image: linear-gradient(rgba(0,245,255,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(0,245,255,0.02) 1px,transparent 1px); background-size:50px 50px; }
.scan { position:absolute;width:100%;height:2px; background:linear-gradient(90deg,transparent,rgba(0,245,255,0.25),transparent); animation:scan 8s linear infinite; }
@keyframes scan{from{top:-2px}to{top:100vh}}
.app { position:relative;z-index:10; width:min(390px,100vw); height:min(844px,100vh); background:linear-gradient(165deg,rgba(18,0,40,0.97) 0%,rgba(4,0,12,0.99) 100%); border-radius:min(48px,4vw); border:1px solid rgba(180,0,255,0.25); box-shadow: 0 0 0 1px rgba(0,245,255,0.08), 0 0 60px rgba(180,0,255,0.15), 0 0 120px rgba(0,245,255,0.06), inset 0 0 40px rgba(180,0,255,0.04); overflow:hidden; display:flex;flex-direction:column; }
.notch { position:absolute;top:0;left:50%;transform:translateX(-50%); width:130px;height:32px; background:#000;border-radius:0 0 20px 20px; z-index:200;display:flex;align-items:center;justify-content:center;gap:8px; }
.n-dot{width:8px;height:8px;border-radius:50%;background:#111;}
.n-cam{background:rgba(0,245,255,0.35);box-shadow:0 0 6px var(--cyan);}
.status{ padding:8px 22px 0; display:flex;align-items:center;justify-content:space-between; font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px; flex-shrink:0; }
.sigs{display:flex;gap:2px;align-items:flex-end;}
.sig{width:3px;border-radius:1px;background:rgba(0,245,255,0.45);}
.sig:nth-child(1){height:4px} .sig:nth-child(2){height:7px} .sig:nth-child(3){height:10px} .sig:nth-child(4){height:13px}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;animation:fadeUp .3s ease;}
.screen.active{display:flex;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.auth-wrap{ flex:1;display:flex;flex-direction:column; align-items:center;justify-content:center; padding:20px 28px 40px;gap:0; }
.auth-logo { font-family:'Orbitron',sans-serif;font-weight:900;font-size:36px; letter-spacing:8px; background:linear-gradient(90deg,var(--cyan),var(--violet)); -webkit-background-clip:text;-webkit-text-fill-color:transparent; filter:drop-shadow(0 0 12px rgba(0,245,255,0.6)); margin-bottom:4px; }
.auth-tagline{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.25);margin-bottom:40px;text-align:center;}
.auth-tabs{display:flex;gap:0;margin-bottom:28px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);overflow:hidden;}
.auth-tab{ flex:1;padding:10px;text-align:center;font-size:11px;letter-spacing:3px; cursor:pointer;transition:all .25s;color:rgba(255,255,255,0.3); font-family:'Share Tech Mono',monospace; }
.auth-tab.active{background:linear-gradient(135deg,rgba(0,245,255,0.12),rgba(180,0,255,0.12));color:var(--cyan);border-bottom:1px solid var(--cyan);}
.auth-form{width:100%;display:flex;flex-direction:column;gap:14px;}
.field-wrap{position:relative;}
.field-label{font-size:9px;letter-spacing:3px;color:rgba(0,245,255,0.5);margin-bottom:6px;display:block;}
.auth-input{ width:100%;padding:14px 16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; color:#fff;font-family:'Share Tech Mono',monospace;font-size:16px;letter-spacing:1px; outline:none;transition:all .25s; -webkit-appearance:none;appearance:none; touch-action:manipulation; }
.auth-btn{ margin-top:8px;padding:16px;border-radius:16px; background:linear-gradient(135deg,rgba(0,245,255,0.15),rgba(180,0,255,0.2)); border:1px solid rgba(0,245,255,0.35); color:var(--cyan);font-size:12px;letter-spacing:4px; font-family:'Share Tech Mono',monospace;cursor:pointer; transition:all .25s; }
.auth-btn:hover{background:linear-gradient(135deg,rgba(0,245,255,0.25),rgba(180,0,255,0.3));box-shadow:var(--glow-c);}
.auth-error{ font-size:11px;letter-spacing:1px;color:var(--pink); text-align:center;min-height:16px; margin-top:10px; }
.chat-header{ padding:42px 18px 14px; display:flex;align-items:center;gap:12px; background:linear-gradient(180deg,rgba(8,0,20,0.95) 0%,transparent 100%); border-bottom:1px solid var(--gb);flex-shrink:0; backdrop-filter:blur(20px); }
.messages-wrap{ flex:1;overflow-y:auto;padding:12px 14px; display:flex;flex-direction:column;gap:10px; }
.msg-bubble{ max-width:76%;padding:11px 15px; border-radius:18px;position:relative; font-size:16px;letter-spacing:2px;line-height:1.7; animation:bubIn .3s cubic-bezier(.34,1.56,.64,1); word-break:break-all; }
.msg-group.sent .msg-bubble{ background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(180,0,255,0.07)); border:1px solid rgba(0,245,255,0.2); border-bottom-right-radius:5px; align-self: flex-end; }
.msg-group.recv .msg-bubble{ background:linear-gradient(135deg,rgba(180,0,255,0.09),rgba(0,245,255,0.04)); border:1px solid rgba(180,0,255,0.18); border-bottom-left-radius:5px; align-self: flex-start; }
.input-area{ padding:10px 12px 24px;flex-shrink:0; background:linear-gradient(0deg,rgba(8,0,20,.97) 0%,transparent 100%); backdrop-filter:blur(20px); }
.input-row{ display:flex;align-items:flex-end;gap:8px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:22px;padding:8px 8px 8px 14px; }
#msgInput{ flex:1;background:none;border:none;outline:none; color:rgba(255,255,255,.85);font-family:'Share Tech Mono',monospace; font-size:15px;letter-spacing:1px;caret-color:var(--cyan); }
.send-btn{ width:36px;height:36px;border-radius:50%; background:linear-gradient(135deg,var(--cyan),var(--violet)); border:none; color:#000; font-size:15px; display:flex;align-items:center;justify-content:center; }
</style>
</head>
<body>

<div class="bg"><div class="bg-grad"></div><div class="grid"></div><div class="scan"></div></div>

<div class="app">
    <div class="notch"><div class="n-dot"></div><div class="n-dot n-cam"></div><div class="n-dot"></div></div>

    <div class="screen active" id="authScreen">
        <div class="auth-wrap">
            <div class="auth-logo">ZYPHRA</div>
            <div class="auth-tagline">// CLOUD · STREAM · SYNC</div>
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">LOGIN</div>
                <div class="auth-tab" id="registerTab" onclick="switchTab('register')">REGISTER</div>
            </div>
            <div class="auth-form">
                <div class="field-wrap" id="nameField" style="display:none;">
                    <label class="field-label">// DISPLAY NAME</label>
                    <input class="auth-input" id="authName" type="text" placeholder="CHOOSE IDENTIFIER">
                </div>
                <div class="field-wrap">
                    <label class="field-label">// EMAIL ADDRESS</label>
                    <input class="auth-input" id="authEmail" type="email" placeholder="YOUR@EMAIL.COM">
                </div>
                <div class="field-wrap">
                    <label class="field-label">// PASSWORD</label>
                    <input class="auth-input" id="authPass" type="password" placeholder="••••••••">
                </div>
                <button class="auth-btn" id="authActionBtn" onclick="doAuth()">AUTHORIZE ACCESS</button>
                <div id="authErr" class="auth-error"></div>
            </div>
        </div>
    </div>

    <div class="screen" id="chatScreen">
        <div class="chat-header">
            <div style="flex:1;">
                <div style="font-size:18px; letter-spacing:4px; font-family:'Orbitron';">ZYPHRA</div>
                <div id="userBadge" style="font-size:9px; color:var(--cyan); letter-spacing:2px;">CONNECTING...</div>
            </div>
            <button onclick="doLogout()" style="background:none; border:none; color:var(--pink); font-family:inherit; font-size:10px; cursor:pointer;">[TERMINATE]</button>
        </div>
        <div class="messages-wrap" id="msgContainer"></div>
        <div class="input-area">
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Enter encrypted payload..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB6lHfgeHnWv9mGZDMv9sUdXn4X1sZUoig",
    authDomain: "zyphra-7f24f.firebaseapp.com",
    projectId: "zyphra-7f24f",
    storageBucket: "zyphra-7f24f.firebasestorage.app",
    messagingSenderId: "337303523983",
    appId: "1:337303523983:web:259d1805f5d114ca8456fa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentMode = 'login';
let currentUser = null;

// Handle Screen Switching
window.switchTab = (mode) => {
    currentMode = mode;
    document.getElementById('loginTab').classList.toggle('active', mode === 'login');
    document.getElementById('registerTab').classList.toggle('active', mode === 'register');
    document.getElementById('nameField').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('authActionBtn').textContent = mode === 'register' ? 'INITIALIZE ACCOUNT' : 'AUTHORIZE ACCESS';
};

// Handle Authentication
window.doAuth = async () => {
    const email = document.getElementById('authEmail').value.trim();
    const pass = document.getElementById('authPass').value;
    const name = document.getElementById('authName').value.trim();
    const err = document.getElementById('authErr');

    try {
        if(currentMode === 'register') {
            if(!name) throw new Error("Display name required");
            await createUserWithEmailAndPassword(auth, email, pass);
            localStorage.setItem('zy_name', name);
        } else {
            await signInWithEmailAndPassword(auth, email, pass);
        }
    } catch (e) {
        err.textContent = "// " + e.message.toUpperCase();
    }
};

window.doLogout = () => signOut(auth);

// Real-time Auth State
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('authScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');
        document.getElementById('userBadge').textContent = localStorage.getItem('zy_name') || user.email;
        loadMessages();
    } else {
        document.getElementById('chatScreen').classList.remove('active');
        document.getElementById('authScreen').classList.add('active');
    }
});

// Cloud Chat Logic
window.sendMessage = async () => {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text || !currentUser) return;

    await addDoc(collection(db, "messages"), {
        text: text,
        uid: currentUser.uid,
        user: localStorage.getItem('zy_name') || currentUser.email,
        time: serverTimestamp()
    });
    input.value = "";
};

function loadMessages() {
    const q = query(collection(db, "messages"), orderBy("time", "asc"));
    onSnapshot(q, (snapshot) => {
        const container = document.getElementById('msgContainer');
        container.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const isMe = data.uid === currentUser?.uid;
            const div = document.createElement('div');
            div.className = `msg-group ${isMe ? 'sent' : 'recv'}`;
            div.innerHTML = `
                <div style="font-size:8px; color:rgba(255,255,255,0.2); margin-bottom:4px; padding:0 10px;">${data.user}</div>
                <div class="msg-bubble">${data.text}</div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
}
</script>

</body>
</html>
